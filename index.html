<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>AI Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><i class="fas fa-wand-magic-sparkles"></i> AI Tools</strong></li>
        </ul>
        <ul>
            <li><a href="#" class="nav-link active" data-feature="upscaler">
                <i class="fas fa-expand"></i> Upscaler
            </a></li>
        </ul>
    </nav>

    <main class="container-fluid">
        <section id="feature-upscaler">
            <upscaler-app></upscaler-app>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/idiomorph@0.3.0/dist/idiomorph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "lib/morph":                    "./lib/morph.js",
        "lib/escape":                   "./lib/escape.js",
        "lib/fetch-progress":           "./lib/fetch-progress.js",
        "components/image-drop-zone":   "./components/image-drop-zone.js",
        "components/video-drop-zone":   "./components/video-drop-zone.js",
        "components/status-bar":        "./components/status-bar.js",
        "components/compare-slider":    "./components/compare-slider.js",
        "components/image-cropper":     "./components/image-cropper.js"
      }
    }
    </script>
    <script type="module">
        import './features/upscaler/upscaler-app.js';

        function activateFeature(link) {
            const feature = link.dataset.feature;
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.toggle('active', l === link);
                l.setAttribute('aria-current', l === link ? 'page' : '');
            });
            document.querySelectorAll('[id^="feature-"]').forEach(el => {
                el.style.display = el.id === 'feature-' + feature ? '' : 'none';
            });
            localStorage.setItem('aitools_feature', feature);
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                activateFeature(link);
            });
        });

        const savedFeature = localStorage.getItem('aitools_feature');
        const savedLink = savedFeature && document.querySelector(`.nav-link[data-feature="${savedFeature}"]`);
        if (savedLink) {
            activateFeature(savedLink);
        } else {
            document.querySelector('.nav-link.active')?.setAttribute('aria-current', 'page');
        }
    </script>
</body>
</html>
