<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>AI Tools</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><i class="fas fa-wand-magic-sparkles"></i> AI Tools</strong></li>
        </ul>
        <ul>
            <li><a href="#" class="nav-link active" data-feature="upscaler">
                <i class="fas fa-expand"></i> Upscaler
            </a></li>
            <li><a href="#" class="nav-link" data-feature="i2v">
                <i class="fas fa-video"></i> Image to Video
            </a></li>
            <li><a href="#" class="nav-link" data-feature="video-upscaler">
                <i class="fas fa-film"></i> Video Upscaler
            </a></li>
            <li><a href="#" class="nav-link" data-feature="bg-removal">
                <i class="fas fa-eraser"></i> BG Removal
            </a></li>
        </ul>
    </nav>

    <main class="container-fluid">
        <section id="feature-upscaler">
            <upscaler-app></upscaler-app>
        </section>
        <section id="feature-i2v" style="display:none">
            <i2v-app></i2v-app>
        </section>
        <section id="feature-video-upscaler" style="display:none">
            <video-upscaler-app></video-upscaler-app>
        </section>
        <section id="feature-bg-removal" style="display:none">
            <bg-removal-app></bg-removal-app>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/idiomorph@0.3.0/dist/idiomorph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.js"></script>
    <script type="module">
        import './features/upscaler/upscaler-app.js';
        import './features/i2v/i2v-app.js';
        import './features/video-upscaler/video-upscaler-app.js';
        import './features/bg-removal/bg-removal-app.js';

        // Simple nav switching
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const feature = link.dataset.feature;

                // Update active nav
                document.querySelectorAll('.nav-link').forEach(l => {
                    l.classList.toggle('active', l === link);
                    l.setAttribute('aria-current', l === link ? 'page' : '');
                });

                // Toggle feature visibility
                document.querySelectorAll('[id^="feature-"]').forEach(el => {
                    el.style.display = el.id === 'feature-' + feature ? '' : 'none';
                });
            });
        });

        // Set initial aria-current
        document.querySelector('.nav-link.active')?.setAttribute('aria-current', 'page');
    </script>
</body>
</html>
